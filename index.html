<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4CAF50">
    <title>Ліцей Бот - Мобільний додаток</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <img src="assets/logo.png" alt="Logo" class="logo">
                <h1>Ліцей Бот</h1>
                <div class="user-info" id="userInfo">
                    <span id="userName"></span>
                    <button class="logout-btn" onclick="logout()">🚪</button>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="schedule">
                📅 Розклад
            </button>
            <button class="tab-btn" data-tab="current">
                📖 Поточний
            </button>
            <button class="tab-btn" data-tab="substitutions">
                🔄 Заміни
            </button>
            <button class="tab-btn" data-tab="profile">
                👤 Профіль
            </button>
        </div>

        <!-- Content -->
        <div class="content">
            <div id="scheduleTab" class="tab-content active">
                <div class="schedule-controls">
                    <button onclick="changeDay('prev')">◀️</button>
                    <span id="currentDay"></span>
                    <button onclick="changeDay('next')">▶️</button>
                    <button onclick="setToday()">📅 Сьогодні</button>
                </div>
                <div id="scheduleList" class="schedule-list"></div>
            </div>

            <div id="currentTab" class="tab-content">
                <div id="currentLesson" class="current-lesson"></div>
            </div>

            <div id="substitutionsTab" class="tab-content">
                <div id="substitutionsList" class="substitutions-list"></div>
            </div>

            <div id="profileTab" class="tab-content">
                <div class="profile-card">
                    <h3>👤 Особиста інформація</h3>
                    <p><strong>ПІБ:</strong> <span id="profileName"></span></p>
                    <p><strong>Роль:</strong> <span id="profileRole"></span></p>
                    <p><strong>Клас:</strong> <span id="profileGroup"></span></p>
                    <p><strong>Підгрупа:</strong> <span id="profileSubgroup"></span></p>
                </div>
                <button class="sync-btn" onclick="syncData()">
                    🔄 Синхронізувати
                </button>
                <button class="logout-btn-full" onclick="logout()">
                    🚪 Вийти
                </button>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
